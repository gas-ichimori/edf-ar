<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EDF AR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'M PLUS 1p', sans-serif;
  font-weight: 800;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── START SCREEN ── */
#start-screen {
  position: fixed; inset: 0;
  background: url('/bg.png') center center / cover no-repeat;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 32px; z-index: 100;
}
#start-screen::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.45);
}
#start-screen h1, #start-screen p, #btn-start {
  position: relative; z-index: 1;
}
/* ── Logo switcher ── */
#logo-switcher {
  position: relative; z-index: 1;
  width: 220px; height: 90px;
}
#logo-switcher img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.6s ease;
  filter: drop-shadow(0 2px 12px rgba(0,0,0,0.8));
}
#logo-switcher img.active { opacity: 1; }

#start-screen h1 {
  font-size: 22px; letter-spacing: 6px; color: #c8a832;
  text-align: center; line-height: 1.6;
  text-shadow: 0 2px 16px rgba(0,0,0,0.9);
}
#start-screen h1 small {
  display: block;
  font-size: 11px; letter-spacing: 3px; color: #ff4444;
  margin-top: 6px;
  text-shadow: 0 0 10px rgba(255,60,60,0.7);
  animation: blink-warn 1.4s infinite;
}
@keyframes blink-warn { 0%,100%{opacity:1} 50%{opacity:0.5} }
#start-screen p {
  font-size: 13px; color: rgba(223,240,208,0.95);
  text-align: center; letter-spacing: 1px; line-height: 2.0;
  text-shadow: 0 1px 8px rgba(0,0,0,0.9);
}
#start-screen p small {
  display: block;
  font-size: 10px; letter-spacing: 2px; color: rgba(200,168,50,0.8);
  margin-top: 4px;
}
#btn-start {
  display: flex; flex-direction: column;
  align-items: center; gap: 10px;
  padding: 0;
  background: none;
  border: none;
  color: #fff; font-family: inherit; font-weight: 800;
  cursor: pointer; position: relative; z-index: 1;
}
#btn-start img {
  width: 110px; height: 110px; object-fit: contain;
  filter: drop-shadow(0 0 14px rgba(200,168,50,0.6));
  transition: transform 0.15s;
}
#btn-start:active img { transform: scale(0.92); }
#btn-start .btn-ja {
  font-size: 16px; letter-spacing: 4px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}
#btn-start .btn-en {
  font-size: 9px; letter-spacing: 3px; color: rgba(200,240,160,0.8);
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
}

/* ── AR VIEW ── */
#ar-view { position: fixed; inset: 0; display: none; }

#viewfinder {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}

#frame-overlay {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
  display: none;
}

/* HUD top */
#hud-top {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 16px 20px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 20;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
}
.hud-tag { font-size: 10px; letter-spacing: 3px; color: #88ff55; }
.hud-rec {
  font-size: 10px; letter-spacing: 2px; color: #ff4444;
  animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* HUD bottom — capture button */
#hud-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 0 0 48px;
  display: none; /* shown only when ant is placed */
  flex-direction: column;
  align-items: center; gap: 18px;
  z-index: 20;
  background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
}
.hud-hint { font-size: 11px; letter-spacing: 2px; color: rgba(200,240,160,0.8); }
#btn-capture {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 3px solid rgba(255,255,255,0.8);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.1s;
}
#btn-capture:active { transform: scale(0.9); }
#btn-capture::after {
  content: '';
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
}

/* Scan hint */
#scan-hint {
  position: absolute; bottom: 48px; left: 0; right: 0;
  text-align: center;
  font-size: 11px; letter-spacing: 1.5px;
  color: rgba(200,240,160,0.8);
  z-index: 20;
  pointer-events: none;
  line-height: 2;
}

/* Flash */
#flash {
  position: fixed; inset: 0;
  background: #fff;
  opacity: 0; pointer-events: none;
  z-index: 200;
  transition: opacity 0.05s;
}
#flash.on { opacity: 1; }

/* ── RESULT SCREEN ── */
#result-screen {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  display: none;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 150;
  padding: 24px;
}
#captured-img {
  width: 100%; max-width: 360px; max-height: 60vh;
  object-fit: contain;
  border: 2px solid rgba(200,168,50,0.5);
  border-radius: 12px;
}
.result-label {
  font-size: 11px; letter-spacing: 3px; color: #88ff55;
  text-align: center; line-height: 2;
}
.result-label small {
  display: block; font-size: 9px; letter-spacing: 4px;
  color: rgba(136,255,85,0.7);
}
#captured-img {
  border-color: rgba(136,255,85,0.7) !important;
  box-shadow: 0 0 18px rgba(136,255,85,0.25);
}
.result-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
.result-btns button {
  background: none; border: none;
  padding: 0; cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
.result-btns button:active { transform: scale(0.95); opacity: 0.8; }
.result-btns button img { width: 100%; height: auto; display: block; }
</style>
</head>
<body>

<div id="start-screen">
  <div id="logo-switcher">
    <img src="/logo3.png" alt="EDF 5" class="active">
    <img src="/logo2.png" alt="EDF 6">
    <img src="/logo1.png" alt="EDF 6.1">
  </div>
  <h1>巨大蟻出現<small>⚠ WARNING: GIANT ANTS DETECTED</small></h1>
  <p>カメラを起動して地面を認識させろ！<small>ACTIVATE CAMERA. SCAN THE GROUND.</small></p>
  <button id="btn-start">
    <img src="/mark.png" alt="">
    <span class="btn-ja">カメラ起動</span>
    <span class="btn-en">ACTIVATE CAMERA</span>
  </button>
</div>

<video id="bg-video" playsinline webkit-playsinline muted
  style="position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0;"></video>

<div id="ar-view">
  <canvas id="viewfinder"></canvas>
  <img id="frame-overlay" src="/frame.png" alt="">

  <div id="hud-top">
    <span class="hud-tag">EDF // AR MODE</span>
    <span class="hud-rec">● REC</span>
  </div>

  <div id="scan-hint">
    スマートフォンを地面に向けて<br>静止させてください
  </div>

  <div id="hud-bottom">
    <span class="hud-hint">タップして撮影</span>
    <div id="btn-capture"></div>
  </div>
</div>

<div id="flash"></div>

<div id="result-screen">
  <span class="result-label">撮影完了<small>SCAN COMPLETE</small></span>
  <img id="captured-img" alt="撮影した写真">
  <div class="result-btns">
    <button id="btn-share"><img src="/btn_share.png" alt="シェア"></button>
    <button id="btn-save"><img src="/btn_save.png" alt="写真保存"></button>
    <button id="btn-retake"><img src="/btn_retake.png" alt="再撮影"></button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// ── Logo switcher ──
(function() {
  const logos = document.querySelectorAll('#logo-switcher img');
  let current = 0;
  setInterval(() => {
    logos[current].classList.remove('active');
    current = (current + 1) % logos.length;
    logos[current].classList.add('active');
  }, 2000);
})();

const canvas = $('viewfinder');
const ctx    = canvas.getContext('2d');

// ── App state machine ──
// 'scanning' → 'stabilizing' → 'placing' → 'placed'
let appState = 'scanning';

// ── Motion detection ──
const REQUIRED_STILL  = 2200; // ms of stillness needed
const MOTION_THRESH   = 0.28; // acceleration change threshold
let stillDuration = 0;
let lastAccel     = { x: 0, y: 0, z: 0 };
let lastMotionMs  = 0;

// ── Placement animation ──
const PLACING_DURATION = 900; // ms
let placingStartTime = 0;

// ── Ant walk ──
let antX = 0, antY = 0, antVx = -0.55;

// ── Animation timer ──
let animT  = 0;
let rafId  = null;
let video  = null;
let capturedBlob = null;

// ── Ground indicator anchor (set when stabilised) ──
let groundCX = 0, groundCY = 0;

// ── Images ──
const frameImg = new Image(); let frameLoaded = false;
frameImg.onload = () => { frameLoaded = true; $('frame-overlay').style.display = 'block'; };
frameImg.src = '/frame.png';

// ── Ant frames ──
const ANT_FRAME_COUNT  = 4;
const ANT_FRAME_MS     = 130; // ms per frame
const antFrames        = [];
let antFramesLoaded    = 0;
let antLoaded          = false;
let antImg             = null;
let lastFrameSwitch    = 0;
let currentAntFrame    = 0;
for (let i = 1; i <= ANT_FRAME_COUNT; i++) {
  const img = new Image();
  img.onload = () => {
    antFramesLoaded++;
    if (antFramesLoaded === ANT_FRAME_COUNT) { antLoaded = true; antImg = antFrames[0]; }
  };
  img.src = `/ant${i}.png`;
  antFrames.push(img);
}

// ── Front-facing (turn) frame ──
const antFrontImg = new Image(); let antFrontLoaded = false;
antFrontImg.onload = () => { antFrontLoaded = true; };
antFrontImg.src = '/ant_front.png';

// ── Crush frame ──
const antCrushImg = new Image(); let antCrushLoaded = false;
antCrushImg.onload = () => { antCrushLoaded = true; };
antCrushImg.src = '/ant_crush.png';

// ── Turning state ──
let antTurning       = false;
let antTurnStartTime = 0;
let antPendingVx     = 0;
const ANT_TURN_MS    = 420;

// ── Crush state ──
let antCrushed       = false;
let antCrushStartTime = 0;
const ANT_CRUSH_MS   = 1500;

// ────────────────────────────────────────
//  START
// ────────────────────────────────────────
$('btn-start').addEventListener('click', startAR);

async function startAR() {
  let stream;
  try {
    // まず背面カメラを試みる
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false,
    });
  } catch (e1) {
    try {
      // 失敗したら制約なしで再試行（Android互換）
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    } catch (e2) {
      alert('カメラの起動に失敗しました。\n\n【対処方法】\nブラウザの設定 → サイトの設定 → カメラ → このサイトを「許可」に変更してください。\n\n(' + e2.message + ')');
      return;
    }
  }
  try {
    video = $('bg-video');
    video.srcObject = stream;
    await video.play();

    // iOS: request motion sensor permission (must be inside user gesture)
    await setupMotion();

    const proceed = () => {
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      appState = 'scanning';
      $('start-screen').style.display = 'none';
      $('ar-view').style.display = 'block';
      rafId = requestAnimationFrame(renderLoop);
    };

    if (video.videoWidth > 0) {
      proceed();
    } else {
      video.addEventListener('loadedmetadata', proceed, { once: true });
      setTimeout(() => { if (appState !== 'scanning') return; proceed(); }, 1500);
    }
  } catch (e) {
    alert('カメラの起動に失敗しました。\n\n' + e.message);
  }
}

async function setupMotion() {
  if (typeof DeviceMotionEvent === 'undefined') {
    autoFallback();
    return;
  }
  if (typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const result = await DeviceMotionEvent.requestPermission();
      if (result === 'granted') {
        window.addEventListener('devicemotion', onMotion);
      } else {
        autoFallback();
      }
    } catch {
      autoFallback();
    }
  } else {
    window.addEventListener('devicemotion', onMotion);
    // safety net: if no events fire within 3s, fall back
    setTimeout(() => { if (appState === 'scanning') autoFallback(); }, 3000);
  }
}

function autoFallback() {
  // Auto-place after 3.5 seconds for environments without motion sensor
  setTimeout(() => triggerPlacement(), 3500);
}

function onMotion(e) {
  if (appState !== 'scanning' && appState !== 'stabilizing') return;

  const acc = e.acceleration || e.accelerationIncludingGravity;
  if (!acc || acc.x === null) return;

  const now = Date.now();
  const dt  = Math.min(now - (lastMotionMs || now), 80);
  lastMotionMs = now;

  const ax = acc.x || 0, ay = acc.y || 0, az = acc.z || 0;
  const delta = Math.sqrt(
    Math.pow(ax - lastAccel.x, 2) +
    Math.pow(ay - lastAccel.y, 2) +
    Math.pow(az - lastAccel.z, 2)
  );
  lastAccel = { x: ax, y: ay, z: az };

  if (delta < MOTION_THRESH) {
    stillDuration += dt;
    if (appState === 'scanning' && stillDuration > 350) appState = 'stabilizing';
    if (stillDuration >= REQUIRED_STILL) triggerPlacement();
  } else {
    stillDuration = Math.max(0, stillDuration - dt * 2);
    if (appState === 'stabilizing' && stillDuration < 100) appState = 'scanning';
  }
}

function triggerPlacement() {
  if (appState === 'placing' || appState === 'placed') return;
  const cw = canvas.width, ch = canvas.height;
  groundCX = cw / 2;
  groundCY = ch * 0.80;
  antX = groundCX;
  antY = groundCY;
  placingStartTime = Date.now();
  appState = 'placing';
}

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}

// ────────────────────────────────────────
//  RENDER LOOP
// ────────────────────────────────────────
function renderLoop() {
  rafId = requestAnimationFrame(renderLoop);
  animT += 0.018;

  const cw = canvas.width, ch = canvas.height;

  // Camera
  if (video && video.readyState >= 2) {
    const vw = video.videoWidth, vh = video.videoHeight;
    const s  = Math.max(cw / vw, ch / vh);
    ctx.drawImage(video, (cw - vw * s) / 2, (ch - vh * s) / 2, vw * s, vh * s);
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, cw, ch);
  }

  switch (appState) {
    case 'scanning':
    case 'stabilizing':
      drawScanIndicator(cw, ch);
      $('scan-hint').style.display = 'block';
      $('hud-bottom').style.display = 'none';
      break;
    case 'placing':
      drawPlacing(cw, ch);
      $('scan-hint').style.display = 'none';
      $('hud-bottom').style.display = 'none';
      break;
    case 'placed':
      drawAnt(cw, ch);
      $('scan-hint').style.display = 'none';
      $('hud-bottom').style.display = 'flex';
      break;
  }

  if (frameLoaded) ctx.drawImage(frameImg, 0, 0, cw, ch);
}

// ────────────────────────────────────────
//  SCAN INDICATOR
// ────────────────────────────────────────
function drawScanIndicator(cw, ch) {
  const cx = cw / 2;
  const cy = ch * 0.80;
  const gw = cw * 0.52;
  const gh = ch * 0.075;

  const isStab    = appState === 'stabilizing';
  const progress  = Math.min(stillDuration / REQUIRED_STILL, 1);
  const color     = isStab ? '#88ff55' : '#c8a832';
  const pulse     = 0.65 + Math.sin(animT * 3.2) * 0.2;

  // Trapezoid corners (perspective ground plane)
  const tl = { x: cx - gw * 0.33, y: cy - gh };
  const tr = { x: cx + gw * 0.33, y: cy - gh };
  const br = { x: cx + gw * 0.5,  y: cy };
  const bl = { x: cx - gw * 0.5,  y: cy };

  ctx.save();

  // Green glow fill when stabilising
  if (isStab) {
    ctx.beginPath();
    ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
    ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
    ctx.closePath();
    ctx.fillStyle = `rgba(136,255,85,${0.05 + 0.08 * progress})`;
    ctx.fill();
  }

  // Grid lines inside trapezoid
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
  ctx.closePath();
  ctx.clip();
  ctx.strokeStyle = color;
  ctx.globalAlpha = 0.28;
  ctx.lineWidth = 0.8;
  // Horizontal lines
  for (let i = 0; i <= 3; i++) {
    const t  = i / 3;
    const y  = tl.y + (bl.y - tl.y) * t;
    const xl = tl.x + (bl.x - tl.x) * t;
    const xr = tr.x + (br.x - tr.x) * t;
    ctx.beginPath(); ctx.moveTo(xl, y); ctx.lineTo(xr, y); ctx.stroke();
  }
  // Vertical lines (perspective-aware)
  for (let i = 0; i <= 5; i++) {
    const t  = i / 5;
    const xt = tl.x + (tr.x - tl.x) * t;
    const xb = bl.x + (br.x - bl.x) * t;
    ctx.beginPath(); ctx.moveTo(xt, tl.y); ctx.lineTo(xb, bl.y); ctx.stroke();
  }
  ctx.restore();

  // Outline
  ctx.beginPath();
  ctx.moveTo(tl.x, tl.y); ctx.lineTo(tr.x, tr.y);
  ctx.lineTo(br.x, br.y); ctx.lineTo(bl.x, bl.y);
  ctx.closePath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = pulse;
  ctx.stroke();

  // Corner brackets
  const bLen = 14;
  const corners = [
    { p: tl, dx:  1, dy:  1 },
    { p: tr, dx: -1, dy:  1 },
    { p: br, dx: -1, dy: -1 },
    { p: bl, dx:  1, dy: -1 },
  ];
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.globalAlpha = 0.95;
  corners.forEach(({ p, dx, dy }) => {
    ctx.beginPath();
    ctx.moveTo(p.x + dx * bLen, p.y);
    ctx.lineTo(p.x, p.y);
    ctx.lineTo(p.x, p.y + dy * bLen);
    ctx.stroke();
  });

  // Sweep line (animates top→bottom)
  const sweepT  = (animT * 0.75) % 1;
  const sweepY  = tl.y + (bl.y - tl.y) * sweepT;
  const sweepXl = tl.x + (bl.x - tl.x) * sweepT;
  const sweepXr = tr.x + (br.x - tr.x) * sweepT;
  ctx.beginPath();
  ctx.moveTo(sweepXl, sweepY);
  ctx.lineTo(sweepXr, sweepY);
  ctx.strokeStyle = isStab ? '#88ff55' : '#fff';
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.55 * (1 - sweepT);
  ctx.stroke();

  // Status text
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.95;
  ctx.fillText(isStab ? 'SURFACE DETECTED' : 'SCANNING...', cx, cy + 22);

  // Progress bar
  if (isStab && progress > 0) {
    const bw = gw * 0.65;
    const bx = cx - bw / 2;
    const by = cy + 33;
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(bx, by, bw, 3);
    ctx.fillStyle = '#88ff55';
    ctx.globalAlpha = 0.9;
    ctx.fillRect(bx, by, bw * progress, 3);
  }

  ctx.restore();
}

// ────────────────────────────────────────
//  PLACING ANIMATION
// ────────────────────────────────────────
function drawPlacing(cw, ch) {
  const elapsed = Date.now() - placingStartTime;
  const p = Math.min(elapsed / PLACING_DURATION, 1);
  if (p >= 1) { appState = 'placed'; return; }

  // Ease out cubic
  const ease = 1 - Math.pow(1 - p, 3);

  // Ripple ring
  const rp = Math.min(elapsed / 500, 1);
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(groundCX, groundCY, cw * 0.28 * rp, ch * 0.035 * rp, 0, 0, Math.PI * 2);
  ctx.strokeStyle = '#88ff55';
  ctx.lineWidth = 2;
  ctx.globalAlpha = (1 - rp) * 0.9;
  ctx.stroke();
  ctx.restore();

  if (!antLoaded) return;

  const antW = cw * 0.55 * ease;
  const antH = antW * (antImg.naturalHeight / antImg.naturalWidth);

  ctx.save();
  ctx.globalAlpha = Math.min(ease * 1.5, 1);
  ctx.drawImage(antImg, groundCX - antW / 2, groundCY - antH, antW, antH);
  ctx.restore();
}

// ────────────────────────────────────────
//  ANT WALK
// ────────────────────────────────────────
function advanceAntFrame() {
  const now = Date.now();
  if (now - lastFrameSwitch >= ANT_FRAME_MS) {
    currentAntFrame = (currentAntFrame + 1) % ANT_FRAME_COUNT;
    antImg = antFrames[currentAntFrame];
    lastFrameSwitch = now;
  }
}

function drawAnt(cw, ch) {
  if (!antLoaded) return;

  const antW   = cw * 0.55;
  const antH   = antW * (antImg.naturalHeight / antImg.naturalWidth);
  const margin = antW * 0.3;

  // Turning: wait, then flip direction
  if (antTurning) {
    if (!antCrushed && Date.now() - antTurnStartTime >= ANT_TURN_MS) {
      antTurning = false;
      antVx = antPendingVx;
    }
  } else {
    antX += antVx;
    if (antX - antW / 2 < margin) {
      antX = margin + antW / 2;
      antTurning = true; antTurnStartTime = Date.now();
      antPendingVx = Math.abs(antVx);
    } else if (antX + antW / 2 > cw - margin) {
      antX = cw - margin - antW / 2;
      antTurning = true; antTurnStartTime = Date.now();
      antPendingVx = -Math.abs(antVx);
    }
  }

  // Crush timer
  if (antCrushed && Date.now() - antCrushStartTime >= ANT_CRUSH_MS) {
    antCrushed  = false;
    antTurning  = false;
    antVx       = antPendingVx;
  }

  // Choose image
  let drawImg;
  if (antCrushed && antCrushLoaded) {
    drawImg = antCrushImg;
  } else if (antTurning && antFrontLoaded) {
    drawImg = antFrontImg;
  } else {
    advanceAntFrame();
    drawImg = antImg;
  }

  const bob  = (antTurning || antCrushed) ? 0 : Math.sin(animT * 4.0) * 3.5;
  const tilt = (antTurning || antCrushed) ? 0 : Math.sin(animT * 4.0) * 0.025;

  // Shadow
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.filter = 'blur(12px)';
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(antX, antY + antH * 0.04, antW * 0.38, antH * 0.055, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(antX, antY - antH / 2 + bob);
  ctx.rotate(tilt);
  if (!antTurning && !antCrushed && antVx > 0) ctx.scale(-1, 1);
  ctx.drawImage(drawImg, -antW / 2, -antH / 2, antW, antH);
  ctx.restore();
}

// ────────────────────────────────────────
//  ANT TAP (crush)
// ────────────────────────────────────────
canvas.addEventListener('click', onCanvasTap);
canvas.addEventListener('touchend', e => { e.preventDefault(); onCanvasTap(e.changedTouches[0]); }, { passive: false });

function onCanvasTap(e) {
  if (appState !== 'placed') return;
  if (!antTurning || antCrushed) return;

  const rect = canvas.getBoundingClientRect();
  const tx = (e.clientX - rect.left) * (canvas.width  / rect.width);
  const ty = (e.clientY - rect.top)  * (canvas.height / rect.height);

  const antW = canvas.width * 0.55;
  const antH = antW * (antFrontImg.naturalHeight / antFrontImg.naturalWidth || 1);
  const left = antX - antW / 2;
  const top  = antY - antH;

  if (tx >= left && tx <= left + antW && ty >= top && ty <= top + antH) {
    antCrushed = true;
    antCrushStartTime = Date.now();
  }
}

// ────────────────────────────────────────
//  CAPTURE
// ────────────────────────────────────────
$('btn-capture').addEventListener('click', () => {
  $('flash').classList.add('on');
  setTimeout(() => $('flash').classList.remove('on'), 120);
  cancelAnimationFrame(rafId);
  canvas.toBlob(blob => {
    capturedBlob = blob;
    $('captured-img').src = URL.createObjectURL(blob);
    $('ar-view').style.display = 'none';
    $('result-screen').style.display = 'flex';
  }, 'image/jpeg', 0.92);
});

// ── Share ──
$('btn-share').addEventListener('click', async () => {
  if (!capturedBlob) return;
  const file = new File([capturedBlob], 'edf-ar.jpg', { type: 'image/jpeg' });
  try {
    if (navigator.share && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'D3PUBLISHER INC -EDF AR- TGS2026', text: 'D3PUBLISHER TGS2026ブース ※HALL ※※番号 へ緊急出動せよ！ 🎁特別物資を提供中🎁 巨大生物襲来！仲間と共に急げ！EDF！EDF！EDF！ #地球防衛軍 #ディースリー・パブリッシャー #東京ゲームショウ' });
    } else { downloadPhoto(); }
  } catch (e) { if (e.name !== 'AbortError') downloadPhoto(); }
});

// ── Save ──
$('btn-save').addEventListener('click', downloadPhoto);
function downloadPhoto() {
  if (!capturedBlob) return;
  const count = (parseInt(localStorage.getItem('edf-ar-count') || '0') + 1);
  localStorage.setItem('edf-ar-count', count);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(capturedBlob);
  a.download = `edf-ar-${count}.jpg`;
  a.click();
}

// ── Retake ──
$('btn-retake').addEventListener('click', () => {
  appState = 'scanning';
  stillDuration = 0;
  $('result-screen').style.display = 'none';
  $('ar-view').style.display = 'block';
  rafId = requestAnimationFrame(renderLoop);
});
</script>
