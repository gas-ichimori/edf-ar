<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EDF AR — 巨大蟻出現</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  font-family: 'M PLUS 1p', sans-serif;
  font-weight: 800;
  background: #07100a;
  color: #dff0d0;
  overflow: hidden;
}

#bg {
  position: fixed; inset: 0;
  background: url('/bg.png') center center / cover no-repeat;
  z-index: 0;
}
#bg::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.52);
}

#wrap {
  position: relative; z-index: 1;
  width: 100%; height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 40px;
}

/* ロゴスイッチャー */
#logo-switcher {
  position: relative;
  width: 200px; height: 80px;
}
#logo-switcher img {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  opacity: 0;
  transition: opacity 0.6s ease;
  filter: drop-shadow(0 2px 16px rgba(0,0,0,0.8));
}
#logo-switcher img.active { opacity: 1; }

/* タイトル */
#title { text-align: center; }
#title h1 {
  font-size: 56px; letter-spacing: 10px; color: #c8a832;
  line-height: 1.2;
  text-shadow: 0 2px 20px rgba(0,0,0,0.9);
}
#title .warning {
  display: block; margin-top: 10px;
  font-size: 14px; letter-spacing: 4px; color: #ff4444;
  text-shadow: 0 0 12px rgba(255,60,60,0.7);
  animation: blink 1.4s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* テキストブロック */
.text-block { text-align: center; }
.text-block .ja {
  font-size: 26px; letter-spacing: 4px; color: #dff0d0;
  text-shadow: 0 1px 10px rgba(0,0,0,0.9);
  line-height: 1.7;
}
.text-block .en {
  display: block; margin-top: 8px;
  font-size: 12px; letter-spacing: 3px; color: rgba(200,168,50,0.85);
}

/* 右カラム */
#join-label { text-align: center; }
#join-label .ja {
  font-size: 36px; letter-spacing: 6px; color: #88ff55;
  text-shadow: 0 0 20px rgba(136,255,85,0.5);
}
#join-label .en {
  display: block; margin-top: 6px;
  font-size: 12px; letter-spacing: 4px; color: rgba(136,255,85,0.7);
}

/* QRコード */
#qr-wrap {
  background: #fff;
  padding: 20px;
  border-radius: 12px;
  border: 3px solid rgba(136,255,85,0.6);
  box-shadow: 0 0 30px rgba(136,255,85,0.25);
}
#qr-wrap img, #qr-wrap canvas { display: block; }

/* 著作権 */
#copyright {
  position: fixed; bottom: 12px; left: 0; right: 0;
  text-align: center;
  font-size: 9px; letter-spacing: 3px;
  color: rgba(255,255,255,0.35);
  z-index: 2;
}
</style>
</head>
<body>

<div id="bg"></div>

<div id="wrap">

  <div id="logo-switcher">
    <img src="/logo3.png" alt="EDF 5" class="active">
    <img src="/logo2.png" alt="EDF 6">
    <img src="/logo1.png" alt="EDF 6.1">
  </div>

  <div id="title">
    <h1>巨大蟻出現</h1>
    <span class="warning">⚠ WARNING: GIANT ANTS DETECTED</span>
  </div>

  <div class="text-block">
    <p class="ja">ARスキャンで巨大蟻を発見せよ！</p>
    <span class="en">DISCOVER GIANT ANTS WITH AR SCAN.</span>
  </div>

  <div id="join-label">
    <p class="ja">今すぐ参戦！</p>
    <span class="en">JOIN THE BATTLE NOW!</span>
  </div>

  <div id="qr-wrap">
    <div id="qr-code"></div>
  </div>

</div>

<p id="copyright">© D3PUBLISHER INC. All rights reserved.</p>

<script>
new QRCode(document.getElementById('qr-code'), {
  text: 'https://edf-ar.onrender.com',
  width: 280,
  height: 280,
  colorDark: '#000000',
  colorLight: '#ffffff',
  correctLevel: QRCode.CorrectLevel.H
});

(function() {
  const logos = document.querySelectorAll('#logo-switcher img');
  let current = 0;
  setInterval(() => {
    logos[current].classList.remove('active');
    current = (current + 1) % logos.length;
    logos[current].classList.add('active');
  }, 2000);
})();
</script>
</body>
</html>
